name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build staging copy
        run: |
          mkdir -p staging/meridian
          rsync -r --exclude-from=.distignore . staging/meridian/

      - name: Zip release
        run: |
          cd staging
          zip -r ../meridian.zip meridian/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: meridian.zip
          generate_release_notes: true
